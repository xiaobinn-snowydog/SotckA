<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<title>从零搞懂A股 · 闯关</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
:root{
  --bg:#1b1822;--card:rgba(255,255,255,.045);--card2:rgba(255,255,255,.06);
  --gold:#E9A949;--gold2:#F0BE6B;
  --text:#ECE7DE;--muted:#9C968C;--locked:rgba(255,255,255,.05);
  --green:#7FB58A;--red:#C98B6B;--blue:#7C8A93;--purple:#9c8bd0;
  --line:rgba(255,255,255,.08);
  --ease:cubic-bezier(.22,.61,.36,1);
  --nav-h:66px;--hdr-h:56px
}
html,body{height:100%;color:var(--text);
  font-family:-apple-system,"PingFang SC","Hiragino Sans GB",sans-serif;
  font-size:15px;overflow:hidden;-webkit-font-smoothing:antialiased}
body{background:radial-gradient(125% 80% at 50% -10%, #2b2735 0%, #1f1b28 40%, #14121a 100%) fixed,#14121a}
.view{position:fixed;top:0;left:0;right:0;bottom:var(--nav-h);
  overflow-y:auto;overscroll-behavior:contain;-webkit-overflow-scrolling:touch}
.hidden{display:none!important}

/* header */
.hdr{position:sticky;top:0;z-index:10;background:rgba(27,24,34,.72);
  backdrop-filter:blur(14px);-webkit-backdrop-filter:blur(14px);height:var(--hdr-h);
  display:flex;align-items:center;gap:6px;padding:0 14px;border-bottom:1px solid var(--line)}
.back-btn{width:36px;height:36px;border-radius:50%;background:var(--card);border:1px solid var(--line);
  color:var(--text);font-size:18px;display:grid;place-items:center;cursor:pointer;flex:none;
  transition:transform .2s var(--ease)}
.back-btn:active{transform:scale(.9)}
.hdr-title{font-size:15px;font-weight:600;color:var(--muted);letter-spacing:.2px}

/* bottom nav */
#bnav{position:fixed;bottom:0;left:0;right:0;height:var(--nav-h);
  background:rgba(20,18,26,.82);backdrop-filter:blur(16px);-webkit-backdrop-filter:blur(16px);
  border-top:1px solid var(--line);display:flex;z-index:20;padding-bottom:env(safe-area-inset-bottom)}
.nbtn{flex:1;display:flex;flex-direction:column;align-items:center;
  justify-content:center;gap:5px;border:none;background:none;
  color:var(--muted);font-size:11px;letter-spacing:.3px;cursor:pointer;transition:color .25s var(--ease)}
.nbtn.on{color:var(--gold)}
.nbtn .ic{display:grid;place-items:center}
.nbtn .ic svg{width:23px;height:23px;stroke:currentColor;fill:none;stroke-width:1.8;
  stroke-linecap:round;stroke-linejoin:round}
.nbtn.on .ic svg{stroke-width:2}

/* map */
#map-wrap{padding:8px 16px 28px;max-width:480px;margin:0 auto}
.map-ttl{text-align:center;padding:22px 0 8px;font-size:25px;font-weight:750;color:var(--gold);letter-spacing:.5px}
.map-sub{text-align:center;color:var(--text);font-size:13.5px;margin-bottom:6px;opacity:.85}
.map-tip{text-align:center;color:var(--muted);font-size:11.5px;margin-bottom:26px;letter-spacing:.3px}
/* 闯关路径 */
.path-sec{display:flex;align-items:center;gap:10px;margin:30px 4px 20px;
  padding-top:6px;border-top:1px solid var(--line)}
.path-sec:first-child{border-top:none;margin-top:6px}
.path-sec-dot{width:9px;height:9px;border-radius:50%;flex:none}
.path-sec-name{font-size:16px;font-weight:700;letter-spacing:.2px}
.path-sec-cnt{margin-left:auto;font-size:12px;color:var(--muted);letter-spacing:.3px}
.node-row{display:flex;justify-content:center;margin:0 0 20px;position:relative}
.node-row::before{content:'';position:absolute;left:50%;top:-22px;height:46px;width:2px;
  transform:translateX(-1px);z-index:0;
  background:repeating-linear-gradient(180deg,var(--line) 0 5px,transparent 5px 12px)}
.node-pos{display:flex;flex-direction:column;align-items:center;position:relative;z-index:1}
.node{width:64px;height:64px;border-radius:50%;display:grid;place-items:center;cursor:pointer;
  background:var(--card);border:1px solid var(--line);transition:transform .18s var(--ease)}
.node:active{transform:scale(.9)}
.node-emoji{font-size:30px;line-height:1}
.node.lk{background:rgba(255,255,255,.02);cursor:default;border-color:transparent}
.node.lk svg{stroke:var(--muted);opacity:.45}
.node svg{width:24px;height:24px;fill:none;stroke-width:2;stroke-linecap:round;stroke-linejoin:round}
.node.dn{border-color:rgba(127,181,138,.55);background:rgba(127,181,138,.08)}
.node.cur{border:2px solid var(--gold);box-shadow:0 0 0 6px rgba(233,169,73,.12),0 8px 24px -8px var(--gold);
  animation:nodePulse 2.4s var(--ease) infinite}
@keyframes nodePulse{0%,100%{box-shadow:0 0 0 6px rgba(233,169,73,.12),0 8px 24px -8px var(--gold)}
  50%{box-shadow:0 0 0 11px rgba(233,169,73,.05),0 8px 24px -8px var(--gold)}}
.node-flag{position:absolute;top:-22px;left:50%;transform:translateX(-50%);
  background:var(--gold);color:#231c0c;font-size:10px;font-weight:700;padding:2px 9px;border-radius:20px;
  white-space:nowrap;letter-spacing:.5px;z-index:2}
.node-flag::after{content:'';position:absolute;left:50%;bottom:-4px;transform:translateX(-50%);
  border:4px solid transparent;border-top-color:var(--gold);border-bottom:0}
.node-lb{font-size:11px;font-weight:500;text-align:center;line-height:1.35;margin-top:8px;
  max-width:120px;color:var(--text);opacity:.9}
.node-lb.lk{color:var(--muted);opacity:.45}
.soon{text-align:center;color:var(--muted);font-size:12px;
  padding:18px;background:var(--card);border-radius:16px;border:1px dashed var(--line)}

/* progress bar */
.prog-bar{display:flex;align-items:center;gap:6px;padding:12px 16px 4px}
.prog-dots{display:flex;gap:4px;flex:1;flex-wrap:wrap}
.pd{flex:1;min-width:8px;height:6px;border-radius:3px;background:var(--locked);transition:background .3s}
.pd.done{background:var(--green)}
.pd.cur{background:var(--gold)}
.prog-lbl{font-size:11px;color:var(--muted);white-space:nowrap}

/* step card */
#ch-wrap{padding:0 16px 24px;max-width:480px;margin:0 auto}
.scard{background:var(--card);border:1px solid var(--line);border-radius:22px;padding:24px 20px;
  margin-bottom:14px;animation:si .45s var(--ease)}
@keyframes si{from{opacity:0;transform:translateY(14px)}to{opacity:1;transform:none}}
.stag{display:inline-flex;align-items:center;font-size:11px;font-weight:600;padding:4px 12px;
  border-radius:20px;margin-bottom:16px;letter-spacing:.6px}
.stag.hook{background:rgba(108,160,178,.16);color:#a8cdd9}
.stag.prob{background:rgba(140,150,210,.16);color:#b9c0e8}
.stag.conc{background:var(--accent-soft,rgba(233,169,73,.16));color:var(--gold)}
.stag.cht{background:rgba(120,170,150,.15);color:#9fcbb4}
.stag.ex{background:rgba(156,139,208,.16);color:#c3b8e6}
.stag.surp{background:rgba(201,139,107,.18);color:#e0a98c}
.stag.fun{background:rgba(233,169,73,.14);color:#e9c07a}
.stag.goldtag{background:var(--accent-soft,rgba(233,169,73,.16));color:var(--gold)}
.gold-card{text-align:center;padding:34px 22px}
.gold-line{font-size:22px;font-weight:700;line-height:1.62;margin-top:20px;letter-spacing:.3px;color:var(--text)}
.gold-line .hl{color:var(--gold)}
.stag.quiz{background:rgba(124,138,147,.18);color:#aebcc4}
.sbig{font-size:50px;display:block;text-align:center;margin:6px 0 18px;line-height:1}
.sttl{font-size:20px;font-weight:700;margin-bottom:12px;line-height:1.45}
.sbody{font-size:15px;color:#D7D1C7;line-height:1.95}
.sbody strong{color:var(--gold);font-weight:600}
.sbox{background:rgba(233,169,73,.07);border:1px solid rgba(233,169,73,.3);border-radius:14px;
  padding:16px;margin-top:16px}
.sbox p{font-size:14px;color:#E2DACB;line-height:1.85}
.sbox p strong{color:var(--gold)}
.ask-q{font-size:14.5px;color:var(--text);margin-top:18px;margin-bottom:10px;line-height:1.7;font-weight:600}
.ask-input{width:100%;background:rgba(255,255,255,.035);border:1.5px solid var(--line);border-radius:14px;
  padding:13px 14px;color:var(--text);font-size:15px;font-family:inherit;line-height:1.7;outline:none;resize:vertical;
  transition:border-color .2s var(--ease)}
.ask-input:focus{border-color:var(--gold)}
.ask-input::placeholder{color:var(--muted)}

/* chart container */
.cht-wrap{background:rgba(255,255,255,.03);border:1px solid var(--line);border-radius:16px;padding:16px;margin-top:6px}
.cht-ttl{font-size:13px;color:#D7D1C7;font-weight:600;margin-bottom:12px;text-align:center;line-height:1.5}
.cht-note{font-size:11px;color:var(--muted);text-align:center;margin-top:12px;line-height:1.6}
/* 可拖动探索 */
.exp-readout{display:flex;justify-content:center;gap:24px;margin:8px 0 10px;align-items:baseline}
.exp-ro{text-align:center}
.exp-ro b{font-size:24px;font-weight:750;transition:color .2s}
.exp-ro b.gold{color:var(--gold)} .exp-ro b.base{color:#8b97a0;font-size:17px}
.exp-ro span{display:block;font-size:11px;color:var(--muted);margin-top:1px}
.exp-graph{width:100%;display:block;overflow:visible}
.exp-ctrls{margin-top:16px;display:flex;flex-direction:column;gap:15px}
.exp-row{display:flex;justify-content:space-between;align-items:baseline;margin-bottom:9px;font-size:13.5px;color:#D7D1C7}
.exp-val{color:var(--gold);font-weight:700;font-variant-numeric:tabular-nums}
.exp-ctrls input[type=range]{-webkit-appearance:none;appearance:none;width:100%;height:4px;border-radius:99px;cursor:pointer;
  background:linear-gradient(var(--gold),var(--gold)) no-repeat,rgba(255,255,255,.1);background-size:var(--fill,40%) 100%;outline:none}
.exp-ctrls input[type=range]::-webkit-slider-thumb{-webkit-appearance:none;width:24px;height:24px;border-radius:50%;
  background:#fff;box-shadow:0 2px 8px rgba(0,0,0,.45),0 0 0 6px rgba(233,169,73,.16);transition:transform .15s var(--ease)}
.exp-ctrls input[type=range]:active::-webkit-slider-thumb{transform:scale(1.12)}

/* action buttons：统一暖琥珀、有按压感 */
.sbtn{width:100%;padding:16px;border-radius:16px;border:none;
  font-size:16.5px;font-weight:650;letter-spacing:.5px;cursor:pointer;margin-top:10px;
  background:var(--gold);color:#231c0c;box-shadow:0 6px 22px -10px var(--gold);
  transition:transform .18s var(--ease),box-shadow .18s var(--ease)}
.sbtn:active{transform:translateY(2px);box-shadow:0 2px 10px -8px var(--gold)}
.bg,.bp,.bb,.bc{background:var(--gold);color:#231c0c}

/* quiz */
.qttl{font-size:17px;font-weight:700;margin-bottom:16px;line-height:1.6}
.opts{display:flex;flex-direction:column;gap:11px}
.opt{background:var(--card);border:1.5px solid var(--line);border-radius:15px;
  padding:15px 16px;text-align:left;font-size:15px;color:var(--text);
  cursor:pointer;transition:transform .15s var(--ease),border-color .2s,background .2s;line-height:1.5}
.opt:active{transform:scale(.99)}
.opt.ok{background:rgba(127,181,138,.14);border-color:var(--green);color:#bfe0c6}
.opt.no{background:rgba(201,139,107,.14);border-color:var(--red);color:#e6c0ac}
.opt.dim{opacity:.4}
.opt:disabled{cursor:default}
.qfb{margin-top:14px;padding:16px;border-radius:15px;font-size:14.5px;
  line-height:1.85;animation:si .35s var(--ease)}
.qfb.ok{background:rgba(127,181,138,.14);border:1px solid rgba(127,181,138,.4);color:#cfe6d4}
.qfb.no{background:rgba(201,139,107,.13);border:1px solid rgba(201,139,107,.42);color:#e9d2c2}
.qfb strong{color:var(--text)}

/* toolbox */
#tool-wrap{padding:16px;max-width:480px;margin:0 auto}
.intro{background:var(--card);border-radius:14px;padding:16px;margin-bottom:16px}
.intro-em{font-size:34px;display:block;margin-bottom:8px}
.fgrp{margin-bottom:13px}
.flbl{font-size:12px;color:var(--muted);margin-bottom:6px;display:block;font-weight:600}
.finp{width:100%;background:var(--card2);border:1px solid #334155;
  border-radius:10px;padding:12px;color:var(--text);font-size:15px;outline:none;
  transition:border-color .2s}
.finp:focus{border-color:var(--gold)}
.cbtn{width:100%;padding:14px;border-radius:14px;border:none;
  background:var(--gold);color:#000;font-size:16px;font-weight:800;cursor:pointer;margin-top:6px}
.cbtn:active{opacity:.85}
.rbox{background:var(--card);border-radius:14px;padding:16px;margin-top:16px;animation:si .3s ease}
.rmain{font-size:32px;font-weight:900;color:var(--gold);text-align:center;padding:8px 0}
.rsub{text-align:center;font-size:13px;color:var(--muted);margin-bottom:14px}
.br-row{display:flex;align-items:center;gap:8px;margin-bottom:7px}
.br-lbl{font-size:11px;color:var(--muted);width:52px;text-align:right;flex-shrink:0}
.br-trk{flex:1;background:var(--locked);border-radius:4px;height:22px;overflow:hidden}
.br-fil{height:100%;border-radius:4px;transition:width .6s ease;
  display:flex;align-items:center;justify-content:flex-end;padding-right:6px}
.br-fil span{font-size:10px;font-weight:700;color:#000;white-space:nowrap}
.f-gold{background:var(--gold)}.f-blue{background:var(--blue)}
.f-green{background:var(--green)}.f-red{background:var(--red)}

/* progress view */
#prog-wrap{padding:16px;max-width:480px;margin:0 auto}
.pcard{background:var(--card);border-radius:16px;padding:20px;margin-bottom:16px}
.pttl{font-size:13px;color:var(--muted);margin-bottom:10px;font-weight:700}
.ppct{font-size:32px;font-weight:900;color:var(--gold)}
.pbar-t{background:var(--locked);border-radius:8px;height:14px;overflow:hidden;margin:8px 0}
.pbar-f{height:100%;background:linear-gradient(90deg,var(--gold),var(--gold2));
  border-radius:8px;transition:width .8s ease}
.psub{font-size:13px;color:var(--muted)}
.pgrid{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.pstat{background:var(--card2);border-radius:12px;padding:14px;text-align:center}
.psnum{font-size:26px;font-weight:900;color:var(--gold2)}
.pslbl{font-size:11px;color:var(--muted);margin-top:4px}
.psec-ttl{font-size:12px;font-weight:800;color:var(--gold2);margin:14px 0 4px;padding-left:2px}
.chlist-item{display:flex;align-items:center;gap:10px;padding:8px 0;
  border-bottom:1px solid #1e293b;font-size:13px}
.cli-em{font-size:16px;width:24px;text-align:center}
.cli-st{margin-left:auto;font-size:14px}
.rst-btn{width:100%;padding:12px;border-radius:12px;border:1px solid var(--red);
  background:transparent;color:var(--red);font-size:14px;cursor:pointer;margin-top:12px}

/* toast + confetti */
#toast{position:fixed;top:20px;left:50%;transform:translateX(-50%) translateY(-90px);
  background:var(--card);border-radius:20px;padding:10px 20px;font-size:15px;
  font-weight:700;z-index:100;transition:transform .3s ease;border:1px solid var(--gold);
  white-space:nowrap}
#toast.on{transform:translateX(-50%) translateY(0)}
#confetti{position:fixed;inset:0;pointer-events:none;z-index:50;overflow:hidden}
.cp{position:absolute;width:8px;height:8px;border-radius:2px;
  animation:cf 1.2s ease-in forwards}
@keyframes cf{0%{transform:translateY(-20px) rotate(0deg);opacity:1}
  100%{transform:translateY(100vh) rotate(720deg);opacity:0}}
</style>
</head>
<body>

<!-- MAP -->
<div id="view-map" class="view">
  <div id="map-wrap">
    <div class="map-ttl">📈 从零搞懂A股</div>
    <div class="map-sub">没人教过、但你该懂的投资课</div>
    <div class="map-tip">大白话 · 费曼学习法 · 一关5分钟</div>
    <div id="sec-list"></div>
  </div>
</div>

<!-- CHAPTER -->
<div id="view-chapter" class="view hidden">
  <div class="hdr">
    <button class="back-btn" onclick="showView('map')">←</button>
    <span class="hdr-title" id="ch-hdr"></span>
  </div>
  <div class="prog-bar">
    <div class="prog-dots" id="prog-dots"></div>
    <span class="prog-lbl" id="prog-lbl"></span>
  </div>
  <div id="ch-wrap">
    <div id="step-content"></div>
    <div id="step-actions"></div>
  </div>
</div>

<!-- TOOLBOX -->
<div id="view-tool" class="view hidden">
  <div class="hdr"><span style="color:var(--gold);font-size:18px;font-weight:800">复利计算器</span></div>
  <div id="tool-wrap">
    <div class="intro"><span class="intro-em">⛄</span>
      <strong style="display:block;margin-bottom:6px;font-size:15px">定投复利：滚雪球</strong>
      <p style="font-size:13px;color:var(--muted);line-height:1.7">每个月坚持投一笔钱，让时间和复利帮你滚雪球。算算看，多年后你能攒下多少。</p>
    </div>
    <div class="fgrp"><label class="flbl">每月投入（元）</label>
      <input class="finp" type="number" id="iv-m" value="1000"></div>
    <div class="fgrp"><label class="flbl">预期年化收益（%）</label>
      <input class="finp" type="number" id="iv-r" value="8" step="0.5"></div>
    <div class="fgrp"><label class="flbl">坚持年数</label>
      <input class="finp" type="number" id="iv-y" value="20" min="1" max="50"></div>
    <button class="cbtn" onclick="calcInvest()">算算雪球有多大 →</button>
    <div id="iv-res" class="hidden"></div>
    <p style="font-size:11px;color:#64748b;text-align:center;margin-top:14px;line-height:1.6">
      仅为复利演示，收益不构成任何投资建议。<br>真实投资有波动，年化收益并非每年固定。</p>
  </div>
</div>

<!-- PROGRESS -->
<div id="view-progress" class="view hidden">
  <div class="hdr"><span style="color:var(--gold);font-size:18px;font-weight:800">我的进度</span></div>
  <div id="prog-wrap"></div>
</div>

<nav id="bnav">
  <button class="nbtn on" id="nb-map" onclick="showView('map')">
    <span class="ic"><svg viewBox="0 0 24 24"><path d="M5 21V4c3-1.4 5 1.4 8 0s5-1.4 7 0v9c-2 1.4-5-1.4-7 0s-5 1.4-8 0"/></svg></span><span>闯关</span></button>
  <button class="nbtn" id="nb-tool" onclick="showView('tool')">
    <span class="ic"><svg viewBox="0 0 24 24"><rect x="5" y="3" width="14" height="18" rx="2.5"/><line x1="9" y1="7" x2="15" y2="7"/><line x1="9" y1="12" x2="9.01" y2="12"/><line x1="12" y1="12" x2="12.01" y2="12"/><line x1="15" y1="12" x2="15.01" y2="12"/><line x1="9" y1="16" x2="9.01" y2="16"/><line x1="12" y1="16" x2="12.01" y2="16"/><line x1="15" y1="16" x2="15.01" y2="16"/></svg></span><span>计算器</span></button>
  <button class="nbtn" id="nb-progress" onclick="showView('progress')">
    <span class="ic"><svg viewBox="0 0 24 24"><line x1="6" y1="20" x2="6" y2="13"/><line x1="12" y1="20" x2="12" y2="7"/><line x1="18" y1="20" x2="18" y2="10"/></svg></span><span>进度</span></button>
</nav>
<div id="toast"></div>
<div id="confetti"></div>

<script>
// ══════════════════════════════════════════════
// SVG 图表函数库  (viewBox 320×180)
// ══════════════════════════════════════════════
const C={
  gold:'#f59e0b',blue:'#3b82f6',green:'#22c55e',red:'#ef4444',
  purple:'#8b5cf6',muted:'#94a3b8',grid:'#334155',text:'#f8fafc',
  cyan:'#06b6d4',orange:'#f97316'
};
function svg(body,w=320,h=180){
  return `<svg viewBox="0 0 ${w} ${h}" width="100%" style="display:block">${body}</svg>`;
}
function tx(x,y,s,opt={}){
  const {fill=C.muted,size=10,anchor='middle',weight='normal'}=opt;
  return `<text x="${x}" y="${y}" text-anchor="${anchor}" font-size="${size}" fill="${fill}" font-weight="${weight}">${s}</text>`;
}
/* 竖向柱状图 */
function mkBars({labels,vals,colors,unit='',yMax}){
  const W=320,H=160,PL=38,PR=10,PT=18,PB=30;
  const cw=W-PL-PR, ch=H-PT-PB;
  const n=labels.length, bw=Math.floor(cw/n*0.56), gap=cw/n;
  const mx=yMax||Math.max(...vals)*1.12;
  let s=`<line x1="${PL}" y1="${PT}" x2="${PL}" y2="${H-PB}" stroke="${C.grid}" stroke-width="1"/>`;
  s+=`<line x1="${PL}" y1="${H-PB}" x2="${W-PR}" y2="${H-PB}" stroke="${C.grid}" stroke-width="1"/>`;
  [0.25,0.5,0.75,1].forEach(f=>{
    const y=H-PB-ch*f;
    s+=`<line x1="${PL}" y1="${y}" x2="${W-PR}" y2="${y}" stroke="${C.grid}" stroke-width="0.5" stroke-dasharray="3,3"/>`;
    s+=tx(PL-3,y+4,(mx*f>=1000?Math.round(mx*f/100)/10+'k':Math.round(mx*f)),{anchor:'end',size:9});
  });
  vals.forEach((v,i)=>{
    const x=PL+gap*i+gap/2-bw/2;
    const bh=Math.max(2,ch*(v/mx));
    const y=H-PB-bh;
    const col=Array.isArray(colors)?colors[i]:(colors||C.gold);
    s+=`<rect x="${x}" y="${y}" width="${bw}" height="${bh}" rx="3" fill="${col}" opacity="0.92"/>`;
    s+=tx(x+bw/2,y-4,(v>=1000?Math.round(v/100)/10+'k':v)+unit,{fill:col,size:10,weight:'bold'});
    String(labels[i]).split('\n').forEach((ln,li)=>{
      s+=tx(x+bw/2,H-PB+14+li*11,ln,{size:9});
    });
  });
  return svg(s);
}
/* 横向柱状图 */
function mkHBars({labels,vals,colors,unit='%',xMax}){
  const W=320,H=labels.length*30+20;
  const PL=80,PR=44,PT=14,barH=15;
  const mx=xMax||Math.max(...vals)*1.18;
  const tw=W-PL-PR;
  let s=`<line x1="${PL}" y1="${PT-4}" x2="${PL}" y2="${H-6}" stroke="${C.grid}" stroke-width="1"/>`;
  labels.forEach((lb,i)=>{
    const y=PT+i*30;
    const bw=Math.max(2,(vals[i]/mx)*tw);
    const col=Array.isArray(colors)?colors[i]:(colors||C.gold);
    s+=tx(PL-6,y+barH/2+4,lb,{anchor:'end',size:10,fill:C.text});
    s+=`<rect x="${PL}" y="${y}" width="${bw}" height="${barH}" rx="3" fill="${col}" opacity="0.92"/>`;
    s+=tx(PL+bw+5,y+barH/2+4,vals[i]+unit,{anchor:'start',size:10,fill:C.text,weight:'bold'});
  });
  return svg(s,W,H);
}
/* 折线图（多条） */
function mkLine({series,xLabels,yLabel='',unit=''}){
  const W=320,H=170,PL=42,PR=15,PT=22,PB=30;
  const cw=W-PL-PR, ch=H-PT-PB;
  const allY=series.flatMap(s=>s.pts.map(p=>p.y));
  const minY=Math.min(...allY,0), maxY=Math.max(...allY);
  const rng=maxY-minY||1;
  const px=(v,n)=>PL+v*(cw/(n-1));
  const py=(v)=>H-PB-((v-minY)/rng)*ch;
  let s='';
  [0,.25,.5,.75,1].forEach(f=>{
    const yv=minY+rng*f, yp=py(yv);
    s+=`<line x1="${PL}" y1="${yp}" x2="${W-PR}" y2="${yp}" stroke="${C.grid}" stroke-width="0.5" stroke-dasharray="3,3"/>`;
    s+=tx(PL-4,yp+4,Math.round(yv*10)/10+unit,{anchor:'end',size:9});
  });
  s+=`<line x1="${PL}" y1="${PT}" x2="${PL}" y2="${H-PB}" stroke="${C.grid}"/>`;
  s+=`<line x1="${PL}" y1="${H-PB}" x2="${W-PR}" y2="${H-PB}" stroke="${C.grid}"/>`;
  if(xLabels) xLabels.forEach((lb,i)=>{ s+=tx(px(i,xLabels.length),H-PB+16,lb,{size:9}); });
  series.forEach(sr=>{
    const n=sr.pts.length;
    const pts=sr.pts.map((p,i)=>`${px(i,n)},${py(p.y)}`).join(' ');
    s+=`<polyline points="${pts}" fill="none" stroke="${sr.color||C.gold}" stroke-width="2.5" stroke-linejoin="round" stroke-linecap="round"/>`;
    sr.pts.forEach((p,i)=>{ s+=`<circle cx="${px(i,n)}" cy="${py(p.y)}" r="3" fill="${sr.color||C.gold}"/>`; });
  });
  if(series.length>1){
    series.forEach((sr,i)=>{
      const lx=PL+i*(cw/series.length)+6;
      s+=`<rect x="${lx}" y="${PT-14}" width="12" height="4" rx="2" fill="${sr.color||C.gold}"/>`;
      s+=tx(lx+16,PT-10,sr.label||'',{anchor:'start',size:9,fill:C.muted});
    });
  }
  return svg(s);
}
/* 供需交叉 */
function mkCross(){
  const W=300,H=180,ox=40,oy=160,ex=280,ey=20;
  let s='';
  s+=`<line x1="${ox}" y1="${oy}" x2="${ex}" y2="${oy}" stroke="${C.grid}" stroke-width="1"/>`;
  s+=`<line x1="${ox}" y1="${oy}" x2="${ox}" y2="${ey}" stroke="${C.grid}" stroke-width="1"/>`;
  s+=`<line x1="60" y1="40" x2="270" y2="155" stroke="${C.blue}" stroke-width="2.5"/>`;
  s+=`<line x1="60" y1="155" x2="270" y2="40" stroke="${C.green}" stroke-width="2.5"/>`;
  s+=`<circle cx="165" cy="98" r="5" fill="${C.gold}"/>`;
  s+=tx(275,38,'供给',{anchor:'start',size:11,fill:C.green,weight:'bold'});
  s+=tx(275,158,'需求',{anchor:'start',size:11,fill:C.blue,weight:'bold'});
  s+=tx(ox-5,ey+10,'价格',{anchor:'end',size:10});
  s+=tx(ex,oy+15,'数量',{anchor:'end',size:10});
  return svg(s,W,H);
}
/* 流程图 */
function mkFlow(nodes,edges){
  let s='';
  nodes.forEach(n=>{
    const {x,y,w=80,h=30,label,color=C.blue}=n;
    s+=`<rect x="${x-w/2}" y="${y-h/2}" width="${w}" height="${h}" rx="8" fill="${color}" opacity="0.88"/>`;
    s+=tx(x,y+4,label,{fill:'#fff',size:11,weight:'bold'});
  });
  edges.forEach(e=>{
    const {x1,y1,x2,y2,label=''}=e;
    const mx=(x1+x2)/2, my=(y1+y2)/2;
    s+=`<line x1="${x1}" y1="${y1}" x2="${x2}" y2="${y2}" stroke="${C.gold}" stroke-width="1.5" marker-end="url(#arr)"/>`;
    if(label) s+=tx(mx,my-5,label,{size:9,fill:C.gold});
  });
  s=`<defs><marker id="arr" markerWidth="8" markerHeight="6" refX="6" refY="3" orient="auto">
    <polygon points="0,0 8,3 0,6" fill="${C.gold}"/></marker></defs>`+s;
  return svg(s);
}
/* 时间轴 */
function mkTimeline(events){
  const W=320,H=events.length*38+24,cx=30,lx=55;
  let s=`<line x1="${cx}" y1="15" x2="${cx}" y2="${H-12}" stroke="${C.grid}" stroke-width="2"/>`;
  events.forEach((ev,i)=>{
    const y=24+i*38;
    const col=ev.color||C.gold;
    s+=`<circle cx="${cx}" cy="${y}" r="6" fill="${col}"/>`;
    s+=tx(lx,y-5,ev.year,{anchor:'start',size:11,fill:col,weight:'bold'});
    s+=tx(lx,y+9,ev.label,{anchor:'start',size:10,fill:C.text});
  });
  return svg(s,W,H);
}
/* 雷达图 */
function mkRadar({axes,color=C.gold}){
  const W=300,H=210,cx=150,cy=110,r=78;
  const n=axes.length;
  let s='';
  [0.25,0.5,0.75,1].forEach(f=>{
    const pts=axes.map((_,i)=>{
      const a=i/n*Math.PI*2-Math.PI/2;
      return `${cx+r*f*Math.cos(a)},${cy+r*f*Math.sin(a)}`;
    }).join(' ');
    s+=`<polygon points="${pts}" fill="none" stroke="${C.grid}" stroke-width="0.7"/>`;
  });
  axes.forEach((_,i)=>{
    const a=i/n*Math.PI*2-Math.PI/2;
    s+=`<line x1="${cx}" y1="${cy}" x2="${cx+r*Math.cos(a)}" y2="${cy+r*Math.sin(a)}" stroke="${C.grid}" stroke-width="0.7"/>`;
  });
  const dpts=axes.map((ax,i)=>{
    const a=i/n*Math.PI*2-Math.PI/2;
    const v=ax.val/100;
    return `${cx+r*v*Math.cos(a)},${cy+r*v*Math.sin(a)}`;
  }).join(' ');
  s+=`<polygon points="${dpts}" fill="${color}" fill-opacity="0.22" stroke="${color}" stroke-width="2"/>`;
  axes.forEach((ax,i)=>{
    const a=i/n*Math.PI*2-Math.PI/2;
    const lx=cx+(r+16)*Math.cos(a), ly=cy+(r+16)*Math.sin(a);
    s+=tx(lx,ly+4,ax.label,{size:10,fill:C.text});
    const dx=cx+r*(ax.val/100)*Math.cos(a), dy=cy+r*(ax.val/100)*Math.sin(a);
    s+=`<circle cx="${dx}" cy="${dy}" r="3" fill="${color}"/>`;
  });
  return svg(s,W,H);
}
/* 2x2 四象限 */
function mkMatrix({cells,rowLabel,colLabel}){
  const W=300,H=210,PL=52,PT=42,cw=112,ch=72;
  let s='';
  s+=tx(PL+cw/2,PT-10,'← '+colLabel+'低',{size:10});
  s+=tx(PL+cw*1.5,PT-10,colLabel+'高 →',{size:10});
  s+=tx(26,PT+ch/2+4,rowLabel+'低',{size:9});
  s+=tx(26,PT+ch*1.5+4,rowLabel+'高',{size:9});
  cells.forEach(c=>{
    const x=PL+c.col*cw, y=PT+c.row*ch;
    s+=`<rect x="${x}" y="${y}" width="${cw-3}" height="${ch-3}" rx="8" fill="${c.color||C.blue}" opacity="0.16" stroke="${c.color||C.blue}" stroke-width="1.2"/>`;
    s+=tx(x+cw/2,y+ch/2-4,c.label,{size:11,fill:c.color||C.text,weight:'bold'});
    if(c.sub) s+=tx(x+cw/2,y+ch/2+12,c.sub,{size:9,fill:C.muted});
  });
  return svg(s,W,H);
}
</script>

<script src="course-data.js?v=25"></script>

<script>
// ══════════════════════════════════════════════
// 状态
// ══════════════════════════════════════════════
const STORE='azhul_a_stock_v1';
let S={unlocked:[1],completed:[],cur:null,step:0,answered:false,steps:[]};
function loadS(){try{const d=localStorage.getItem(STORE);if(d)Object.assign(S,JSON.parse(d))}catch(e){}}
function saveS(){try{localStorage.setItem(STORE,JSON.stringify({unlocked:S.unlocked,completed:S.completed}))}catch(e){}}

// ══════════════════════════════════════════════
// 导航
// ══════════════════════════════════════════════
function showView(name){
  ['map','chapter','tool','progress'].forEach(v=>{
    document.getElementById('view-'+v).classList.toggle('hidden',v!==name);
  });
  ['map','tool','progress'].forEach(v=>{
    const b=document.getElementById('nb-'+v);
    if(b) b.classList.toggle('on',v===name);
  });
  if(name==='map') renderMap();
  if(name==='progress') renderProg();
  window.scrollTo(0,0);
}

// ══════════════════════════════════════════════
// 地图（按篇分组）
// ══════════════════════════════════════════════
function renderMap(){
  const wrap=document.getElementById('sec-list');
  const lockSvg='<svg viewBox="0 0 24 24"><rect x="5" y="11" width="14" height="9" rx="2.2"/><path d="M8 11V8a4 4 0 0 1 8 0v3"/></svg>';
  const doneSvg='<svg viewBox="0 0 24 24" style="stroke:var(--green)"><path d="M5 13l4 4L19 7"/></svg>';
  const wave=[0,34,0,-34];
  let html='';
  SECTIONS.forEach(sec=>{
    const chs=CHAPTERS.filter(c=>c.sec===sec.id);
    const ready=chs.filter(c=>c.conc);
    const doneN=chs.filter(c=>S.completed.includes(c.id)).length;
    html+=`<div class="path-sec">
      <span class="path-sec-dot" style="background:${sec.color}"></span>
      <span class="path-sec-name">${sec.name}</span>
      <span class="path-sec-cnt">${ready.length?doneN+'/'+chs.length:sec.sub}</span>
    </div>`;
    if(ready.length===0){
      html+=`<div class="soon">🔜 ${sec.name} · 敬请期待</div>`;
      return;
    }
    chs.forEach((ch,ci)=>{
      const ul=S.unlocked.includes(ch.id), dn=S.completed.includes(ch.id), has=!!ch.conc;
      const can=ul&&has, isNext=can&&!dn;
      const off=wave[ci%wave.length];
      const inner=dn?doneSvg:(can?`<span class="node-emoji">${ch.emoji}</span>`:lockSvg);
      html+=`<div class="node-row"><div class="node-pos" style="transform:translateX(${off}px)">
        ${isNext?'<div class="node-flag">开始</div>':''}
        <div class="node ${can?'on':'lk'} ${dn?'dn':''} ${isNext?'cur':''}" ${can?`onclick="openChapter(${ch.id})"`:''}>
          ${inner}
        </div>
        <div class="node-lb ${can?'':'lk'}">${ch.title}</div>
      </div></div>`;
    });
  });
  wrap.innerHTML=html;
}

// ══════════════════════════════════════════════
// 关卡流程（动态步骤）
// ══════════════════════════════════════════════
function buildSteps(ch){
  const st=[];
  if(ch.hook) st.push({t:'hook'});
  if(ch.prob) st.push({t:'prob'});
  if(ch.conc) st.push({t:'conc'});
  if(ch.chart) st.push({t:'chart'});
  if(ch.ex) st.push({t:'ex'});
  if(ch.surp) st.push({t:'surp'});
  if(ch.fun) st.push({t:'fun'});
  (ch.quiz||[]).forEach((q,i)=>st.push({t:'quiz',qi:i}));
  if(ch.gold) st.push({t:'gold'});
  return st;
}
function openChapter(id){
  const ch=CHAPTERS.find(c=>c.id===id);
  if(!ch||!ch.conc) return;
  S.cur=id; S.step=0; S.answered=false; S.steps=buildSteps(ch);
  document.getElementById('ch-hdr').textContent=`第${id}关 · ${ch.title}`;
  renderStep(ch,0);
  showView('chapter');
}
function renderStep(ch,n){
  S.step=n; S.answered=false;
  const steps=S.steps, total=steps.length;
  const dots=document.getElementById('prog-dots');
  dots.innerHTML=Array.from({length:total},(_,i)=>
    `<div class="pd ${i<n?'done':i===n?'cur':''}"></div>`).join('');
  document.getElementById('prog-lbl').textContent=`${n+1}/${total}`;
  const sc=document.getElementById('step-content');
  const sa=document.getElementById('step-actions');
  const st=steps[n];
  const quizCount=ch.quiz?ch.quiz.length:0;

  if(st.t==='hook'){
    sc.innerHTML=`<div class="scard">
      <span class="stag hook">🎬 生活里的事</span>
      <span class="sbig">${ch.emoji}</span>
      <div class="sbody" style="font-size:16px;color:var(--text)">${ch.hook}</div>
    </div>`;
    sa.innerHTML=`<button class="sbtn bc" onclick="nextStep()">这有啥说法？→</button>`;
  }
  else if(st.t==='prob'){
    const hasAsk=!!ch.ask;
    sc.innerHTML=`<div class="scard">
      <span class="stag prob">🤔 想一想</span>
      <div class="sttl" style="font-size:${hasAsk?'19px':'21px'};text-align:center;padding:${hasAsk?'10px 0 4px':'14px 0'};line-height:1.6">${ch.prob}</div>
      ${hasAsk?`<div class="ask-q">${ch.ask}</div>
      <textarea id="ask-input" class="ask-input" rows="3" placeholder="写下你的例子……（只给自己看，写出来才记得牢）"></textarea>`:''}
    </div>`;
    sa.innerHTML=`<button class="sbtn bg" onclick="${hasAsk?'saveAsk();':''}nextStep()">${hasAsk?'写好了，看答案 →':'我想知道答案 →'}</button>`;
    if(hasAsk){ const v=loadAsk(S.cur); if(v) document.getElementById('ask-input').value=v; }
  }
  else if(st.t==='conc'){
    sc.innerHTML=`<div class="scard">
      <span class="stag conc">📖 一句话讲明白</span>
      <div class="sttl">${ch.conc.ttl}</div>
      <div class="sbody">${ch.conc.body}</div>
    </div>`;
    sa.innerHTML=`<button class="sbtn bg" onclick="nextStep()">${ch.chart?'明白了，看图 →':'懂了，继续 →'}</button>`;
  }
  else if(st.t==='chart'){
    if(ch.chart.explore){
      sc.innerHTML=`<div class="scard">
        <span class="stag cht">🎚️ 拖一拖，自己看</span>
        <div class="cht-wrap">${exploreHTML(ch.chart)}</div>
      </div>`;
      sa.innerHTML=`<button class="sbtn bc" onclick="nextStep()">看明白了 →</button>`;
      initExplore(ch.chart.explore);
    }else{
      sc.innerHTML=`<div class="scard">
        <span class="stag cht">📊 看张图</span>
        <div class="cht-wrap">
          <div class="cht-ttl">${ch.chart.ttl}</div>
          ${ch.chart.svg}
          ${ch.chart.note?`<div class="cht-note">${ch.chart.note}</div>`:''}
        </div>
      </div>`;
      sa.innerHTML=`<button class="sbtn bc" onclick="nextStep()">看懂了 →</button>`;
    }
  }
  else if(st.t==='ex'){
    sc.innerHTML=`<div class="scard">
      <span class="stag ex">💡 举个例子</span>
      <span class="sbig">${ch.ex.em}</span>
      <div class="sttl">${ch.ex.ttl}</div>
      <div class="sbody">${ch.ex.body}</div>
    </div>`;
    sa.innerHTML=`<button class="sbtn bp" onclick="nextStep()">${ch.surp?'还有反转！→':'继续 →'}</button>`;
  }
  else if(st.t==='surp'){
    sc.innerHTML=`<div class="scard">
      <span class="stag surp">😱 反转一下</span>
      <span class="sbig">${ch.surp.em}</span>
      <div class="sttl">${ch.surp.ttl}</div>
      <div class="sbody">${ch.surp.body}</div>
      <div class="sbox"><p>${ch.surp.detail}</p></div>
    </div>`;
    sa.innerHTML=`<button class="sbtn bb" onclick="nextStep()">${ch.fun?'还有个冷知识 →':'去闯关 →'}</button>`;
  }
  else if(st.t==='fun'){
    sc.innerHTML=`<div class="scard">
      <span class="stag fun">🎈 趣味冷知识</span>
      <span class="sbig">${ch.fun.em}</span>
      <div class="sttl">${ch.fun.ttl}</div>
      <div class="sbody">${ch.fun.body}</div>
    </div>`;
    sa.innerHTML=`<button class="sbtn bb" onclick="nextStep()">去闯关 →</button>`;
  }
  else if(st.t==='quiz'){
    const q=ch.quiz[st.qi];
    const isLast=(n===total-1);
    sc.innerHTML=`<div class="scard">
      <span class="stag quiz">❓ 闯关题</span>
      <div style="font-size:11px;color:var(--muted);margin-bottom:12px">第${st.qi+1}题，共${quizCount}题</div>
      <div class="qttl">${q.q}</div>
      <div class="opts">${q.opts.map((o,i)=>
        `<button class="opt" onclick="checkAns(${i})">${['A','B','C','D'][i]}. ${o}</button>`
      ).join('')}</div>
      <div id="qfb" class="hidden"></div>
    </div>`;
    sa.innerHTML=`<button class="sbtn ${isLast?'bg':'bb'} hidden" id="next-btn" onclick="${isLast?'unlockNext()':'nextStep()'}">${isLast?'完成这一关 →':((steps[n+1]&&steps[n+1].t==='gold')?'记住一句 →':'下一题 →')}</button>`;
  }
  else if(st.t==='gold'){
    sc.innerHTML=`<div class="scard gold-card">
      <span class="stag goldtag">🔑 记住一句就够</span>
      <div class="gold-line">${ch.gold}</div>
    </div>`;
    sa.innerHTML=`<button class="sbtn bg" onclick="unlockNext()">完成这一关 →</button>`;
  }
  document.getElementById('view-chapter').scrollTop=0;
}
function nextStep(){
  const ch=CHAPTERS.find(c=>c.id===S.cur);
  renderStep(ch,S.step+1);
}
function askKey(id){return 'azhul_ask_'+id;}
function saveAsk(){try{const el=document.getElementById('ask-input');if(el)localStorage.setItem(askKey(S.cur),el.value);}catch(e){}}
function loadAsk(id){try{return localStorage.getItem(askKey(id))||'';}catch(e){return '';}}
function checkAns(chosen){
  if(S.answered) return;
  S.answered=true;
  const ch=CHAPTERS.find(c=>c.id===S.cur);
  const q=ch.quiz[S.steps[S.step].qi];
  const cor=q.cor;
  document.querySelectorAll('.opt').forEach((b,i)=>{
    b.disabled=true;
    if(i===cor) b.classList.add('ok');
    else if(i===chosen) b.classList.add('no');
    else b.classList.add('dim');
  });
  const fb=document.getElementById('qfb');
  const right=chosen===cor;
  fb.className='qfb '+(right?'ok':'no');
  fb.innerHTML=right?`<strong>✓ 对了。</strong> ${q.ex}`:`<strong>差一点。</strong> ${q.ex}`;
  fb.classList.remove('hidden');
  if(right){
    document.getElementById('next-btn').classList.remove('hidden');
  }else{
    setTimeout(()=>{ renderStep(ch,S.step); },3200);
  }
}
function unlockNext(){
  const id=S.cur;
  if(!S.completed.includes(id)) S.completed.push(id);
  const nxt=id+1;
  const nextCh=CHAPTERS.find(c=>c.id===nxt);
  if(nextCh && nextCh.conc){
    if(!S.unlocked.includes(nxt)){ S.unlocked.push(nxt); toast('🔓 第'+nxt+'关已解锁！'); }
    else toast('✅ 本关已完成！');
  }else if(nextCh){
    if(!S.unlocked.includes(nxt)) S.unlocked.push(nxt);
    toast('🎉 本篇暂时到这，后续关卡马上更新！');
  }else{
    toast('🏆 太厉害了，全部通关！');
  }
  saveS();
  showView('map');
}

// ══════════════════════════════════════════════
// 复利计算器
// ══════════════════════════════════════════════
// ══════════════════════════════════════════════
// 可拖动探索（图自己会讲课）
// ══════════════════════════════════════════════
function exploreHTML(chart){
  const k=chart.explore;
  let body='';
  if(k==='compound') body=`
    <div class="exp-readout">
      <div class="exp-ro"><b id="exp-base" class="base">36万</b><span>你投入的本金</span></div>
      <div class="exp-ro"><b id="exp-gold" class="gold">150万</b><span>滚成的本息</span></div>
    </div>
    <svg class="exp-graph" id="exp-graph" viewBox="0 0 320 170"></svg>
    <div class="exp-ctrls">
      <div class="exp-ctrl"><div class="exp-row"><span>年化收益率</span><span class="exp-val" id="exp-vr">8%</span></div>
        <input type="range" id="exp-rate" min="4" max="12" step="0.5" value="8" oninput="drawCompound()"></div>
      <div class="exp-ctrl"><div class="exp-row"><span>坚持的年数</span><span class="exp-val" id="exp-vy">30 年</span></div>
        <input type="range" id="exp-year" min="10" max="40" step="1" value="30" oninput="drawCompound()"></div>
    </div>`;
  else if(k==='drawdown') body=`
    <div class="exp-readout">
      <div class="exp-ro"><b id="dd-drop" class="base">跌50%</b><span>这一次亏了</span></div>
      <div class="exp-ro"><b id="dd-rec" class="gold">+100%</b><span>才能涨回本</span></div>
    </div>
    <svg class="exp-graph" id="dd-graph" viewBox="0 0 320 140"></svg>
    <div class="exp-ctrls">
      <div class="exp-ctrl"><div class="exp-row"><span>这一次跌了多少</span><span class="exp-val" id="dd-v">50%</span></div>
        <input type="range" id="dd-rate" min="10" max="80" step="5" value="50" oninput="drawDrawdown()"></div>
    </div>`;
  else if(k==='pe') body=`
    <div class="exp-readout">
      <div class="exp-ro"><b id="pe-v2" class="base">10倍</b><span>市盈率</span></div>
      <div class="exp-ro"><b id="pe-yr" class="gold">约10年</b><span>才回本</span></div>
    </div>
    <svg class="exp-graph" id="pe-graph" viewBox="0 0 320 110"></svg>
    <div class="exp-ctrls">
      <div class="exp-ctrl"><div class="exp-row"><span>市盈率（PE）</span><span class="exp-val" id="pe-v">10倍</span></div>
        <input type="range" id="pe-rate" min="5" max="60" step="1" value="10" oninput="drawPE()"></div>
    </div>`;
  else if(k==='flood') body=`
    <svg class="exp-graph" id="fl-graph" viewBox="0 0 320 140"></svg>
    <div class="exp-ctrls">
      <div class="exp-ctrl"><div class="exp-row"><span>央行放水的力度</span><span class="exp-val" id="fl-v">中</span></div>
        <input type="range" id="fl-rate" min="0" max="100" step="5" value="40" oninput="drawFlood()"></div>
    </div>`;
  return `<div class="cht-ttl">${chart.ttl}</div>${body}
    ${chart.note?`<div class="cht-note">${chart.note}</div>`:''}`;
}
function initExplore(k){
  if(k==='compound') drawCompound();
  else if(k==='drawdown') drawDrawdown();
  else if(k==='pe') drawPE();
  else if(k==='flood') drawFlood();
}
function drawDrawdown(){
  const d=+document.getElementById('dd-rate').value, rec=Math.round(d/(100-d)*100);
  document.getElementById('dd-v').textContent=d+'%';
  document.getElementById('dd-drop').textContent='跌'+d+'%';
  document.getElementById('dd-rec').textContent='+'+rec+'%';
  document.getElementById('dd-rate').style.setProperty('--fill',((d-10)/70*100)+'%');
  const base=116,maxH=92,sc=v=>Math.min(v,400)/400*maxH;
  const dh=sc(d),rh=sc(rec);
  document.getElementById('dd-graph').innerHTML=`
    <text x="86" y="16" font-size="11" fill="#9C968C" text-anchor="middle">这次跌幅</text>
    <text x="234" y="16" font-size="11" fill="#9C968C" text-anchor="middle">要涨多少才回本</text>
    <rect x="56" y="${base-dh}" width="60" height="${dh}" rx="5" fill="#C98B6B"/>
    <text x="86" y="${base-dh-6}" font-size="13" fill="#e0a98c" text-anchor="middle" font-weight="700">${d}%</text>
    <rect x="204" y="${base-rh}" width="60" height="${rh}" rx="5" fill="#E9A949"/>
    <text x="234" y="${base-rh-6}" font-size="13" fill="#E9A949" text-anchor="middle" font-weight="700">${rec}%</text>
    <line x1="20" y1="${base}" x2="300" y2="${base}" stroke="rgba(255,255,255,.08)"/>`;
}
function drawPE(){
  const pe=+document.getElementById('pe-rate').value;
  document.getElementById('pe-v').textContent=pe+'倍';
  document.getElementById('pe-v2').textContent=pe+'倍';
  document.getElementById('pe-yr').textContent='约'+pe+'年';
  document.getElementById('pe-rate').style.setProperty('--fill',((pe-5)/55*100)+'%');
  const W=320,PL=16,PR=16,barY=44,barH=34,bw=W-PL-PR,seg=bw/pe;
  let segs='';
  for(let i=0;i<pe;i++){ segs+=`<rect x="${PL+i*seg}" y="${barY}" width="${Math.max(seg-1.2,0.6)}" height="${barH}" rx="2" fill="#E9A949" opacity="${(0.3+0.55*(i/pe)).toFixed(2)}"/>`; }
  document.getElementById('pe-graph').innerHTML=`
    <text x="${W/2}" y="28" font-size="11" fill="#9C968C" text-anchor="middle">买入价 = ${pe} 年的利润（每格 = 1 年）</text>
    ${segs}
    <text x="${W/2}" y="${barY+barH+22}" font-size="11.5" fill="#D7D1C7" text-anchor="middle">市盈率越高，要等越久、越赌它将来不掉队</text>`;
}
function drawFlood(){
  const w=+document.getElementById('fl-rate').value;
  document.getElementById('fl-v').textContent=w<33?'小':w<66?'中':'大';
  document.getElementById('fl-rate').style.setProperty('--fill',w+'%');
  const asset=Math.round(w*1.0), wage=Math.round(w*0.2);
  const base=116,maxH=92,sc=v=>v/100*maxH;
  document.getElementById('fl-graph').innerHTML=`
    <text x="86" y="16" font-size="11" fill="#9C968C" text-anchor="middle">房子·股票</text>
    <text x="234" y="16" font-size="11" fill="#9C968C" text-anchor="middle">普通人工资</text>
    <rect x="56" y="${base-sc(asset)}" width="60" height="${sc(asset)}" rx="5" fill="#E9A949"/>
    <text x="86" y="${base-sc(asset)-6}" font-size="13" fill="#E9A949" text-anchor="middle" font-weight="700">+${asset}%</text>
    <rect x="204" y="${base-sc(wage)}" width="60" height="${Math.max(sc(wage),1)}" rx="5" fill="#7C8A93"/>
    <text x="234" y="${base-sc(wage)-6}" font-size="13" fill="#aab4bb" text-anchor="middle" font-weight="700">+${wage}%</text>
    <line x1="20" y1="${base}" x2="300" y2="${base}" stroke="rgba(255,255,255,.08)"/>`;
}
function initExplore(kind){ if(kind==='compound') drawCompound(); }
function drawCompound(){
  const rate=+document.getElementById('exp-rate').value, years=+document.getElementById('exp-year').value, m=1000;
  document.getElementById('exp-vr').textContent=rate+'%';
  document.getElementById('exp-vy').textContent=years+' 年';
  document.getElementById('exp-rate').style.setProperty('--fill',((rate-4)/8*100)+'%');
  document.getElementById('exp-year').style.setProperty('--fill',((years-10)/30*100)+'%');
  const fv=(r,y)=>{const i=r/100/12,n=y*12;return {c:i>0?m*((Math.pow(1+i,n)-1)/i):m*n,p:m*n};};
  const end=fv(rate,years);
  document.getElementById('exp-base').textContent=fmt(end.p);
  document.getElementById('exp-gold').textContent=fmt(end.c);
  const W=320,H=170,PL=6,PR=10,PT=12,PB=20, x=y=>PL+(y/years)*(W-PL-PR), maxV=end.c, yp=v=>H-PB-(v/maxV)*(H-PT-PB);
  let p=[],c=[]; for(let y=0;y<=years;y++){const f=fv(rate,y);p.push(x(y)+','+yp(f.p));c.push(x(y)+','+yp(f.c));}
  const area=`M${c.join(' L')} L${p.slice().reverse().join(' L')} Z`;
  const ny=Math.round(years*0.78),nf=fv(rate,ny),nx=x(ny),nyMid=(yp(nf.c)+yp(nf.p))/2;
  document.getElementById('exp-graph').innerHTML=`
    <defs><linearGradient id="eg" x1="0" y1="0" x2="0" y2="1"><stop offset="0" stop-color="#E9A949" stop-opacity=".26"/><stop offset="1" stop-color="#E9A949" stop-opacity="0"/></linearGradient></defs>
    <line x1="${PL}" y1="${H-PB}" x2="${W-PR}" y2="${H-PB}" stroke="rgba(255,255,255,.08)"/>
    <path d="${area}" fill="url(#eg)"/>
    <polyline points="${p.join(' ')}" fill="none" stroke="#7C8A93" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"/>
    <polyline points="${c.join(' ')}" fill="none" stroke="#E9A949" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>
    <circle cx="${x(years)}" cy="${yp(end.p)}" r="3.2" fill="#7C8A93"/>
    <circle cx="${x(years)}" cy="${yp(end.c)}" r="4.2" fill="#E9A949"/>
    <text x="${PL}" y="${H-7}" font-size="10" fill="#9C968C" text-anchor="start">今天</text>
    <text x="${W-PR}" y="${H-7}" font-size="10" fill="#9C968C" text-anchor="end">${years}年后</text>
    <text x="${nx-4}" y="${nyMid+3}" font-size="10" fill="#E9A949" font-weight="600" text-anchor="end">复利多赚的 ↑</text>`;
}

function calcInvest(){
  const m=+document.getElementById('iv-m').value||0;
  const r=(+document.getElementById('iv-r').value||0)/100;
  const y=+document.getElementById('iv-y').value||0;
  const months=y*12, mr=r/12;
  let total=0;
  for(let i=0;i<months;i++){ total=(total+m)*(1+mr); }
  const principal=m*months;
  const gain=total-principal;
  const gp=total>0?Math.round(principal/total*100):0;
  const gg=100-gp;
  const el=document.getElementById('iv-res');
  el.className='rbox';
  el.innerHTML=`<div class="rmain">${fmt(total)}</div>
    <div class="rsub">${y}年后大约能攒下</div>
    <div class="br-row"><span class="br-lbl">本金</span>
      <div class="br-trk"><div class="br-fil f-blue" style="width:${gp}%"><span>${fmt(principal)}</span></div></div></div>
    <div class="br-row"><span class="br-lbl">复利收益</span>
      <div class="br-trk"><div class="br-fil f-gold" style="width:${Math.max(gg,8)}%"><span>${fmt(gain)}</span></div></div></div>
    <div style="margin-top:12px;font-size:12px;color:var(--muted);text-align:center;line-height:1.7">
      你一共投入 <strong style="color:var(--blue)">${fmt(principal)}</strong>，<br>
      时间和复利又帮你多赚了 <strong style="color:var(--gold)">${fmt(gain)}</strong>。<br>
      坚持越久，雪球后半段滚得越快。</div>`;
  el.classList.remove('hidden');
}

// ══════════════════════════════════════════════
// 进度页
// ══════════════════════════════════════════════
function renderProg(){
  const readyCh=CHAPTERS.filter(c=>c.conc);
  const dn=S.completed.length, tot=readyCh.length, pct=tot?Math.round(dn/tot*100):0;
  let secHtml='';
  SECTIONS.forEach(sec=>{
    const chs=CHAPTERS.filter(c=>c.sec===sec.id&&c.conc);
    if(!chs.length) return;
    secHtml+=`<div class="psec-ttl">${sec.emoji} ${sec.name}</div>`;
    secHtml+=chs.map(ch=>{
      const d=S.completed.includes(ch.id), u=S.unlocked.includes(ch.id);
      return `<div class="chlist-item">
        <span class="cli-em">${ch.emoji}</span>
        <span>第${ch.id}关 ${ch.title}</span>
        <span class="cli-st" style="color:${d?'var(--green)':u?'var(--gold)':'var(--muted)'}">${d?'✅':u?'🔓':'🔒'}</span>
      </div>`;
    }).join('');
  });
  document.getElementById('prog-wrap').innerHTML=`
    <div class="pcard">
      <div class="pttl">闯关进度</div>
      <div class="ppct">${pct}%</div>
      <div class="pbar-t"><div class="pbar-f" style="width:${pct}%"></div></div>
      <div class="psub">${dn} / ${tot} 关已通关</div>
    </div>
    <div class="pgrid">
      <div class="pstat"><div class="psnum">${dn}</div><div class="pslbl">已通关</div></div>
      <div class="pstat"><div class="psnum">${S.unlocked.filter(i=>CHAPTERS.find(c=>c.id===i&&c.conc)).length}</div><div class="pslbl">已解锁</div></div>
    </div>
    <div class="pcard" style="margin-top:16px">
      <div class="pttl">关卡列表</div>${secHtml}
    </div>
    <button class="rst-btn" onclick="resetAll()">🔄 重置全部进度</button>`;
}
function resetAll(){
  if(!confirm('确定重置所有进度？')) return;
  S.unlocked=[1]; S.completed=[]; saveS(); renderProg(); toast('进度已重置！');
}

// ══════════════════════════════════════════════
// 工具
// ══════════════════════════════════════════════
function fmt(n){
  if(Math.abs(n)>=1e8) return (n/1e8).toFixed(2)+'亿';
  if(Math.abs(n)>=1e4) return (n/1e4).toFixed(1)+'万';
  return Math.round(n).toLocaleString();
}
function toast(msg){
  const t=document.getElementById('toast');
  t.textContent=msg; t.classList.add('on');
  setTimeout(()=>t.classList.remove('on'),2500);
}
function confetti(){
  const el=document.getElementById('confetti');
  el.innerHTML='';
  const cols=['#f59e0b','#3b82f6','#22c55e','#ef4444','#8b5cf6','#ec4899'];
  for(let i=0;i<42;i++){
    const p=document.createElement('div');
    p.className='cp';
    p.style.cssText=`left:${Math.random()*100}%;background:${cols[i%cols.length]};
      animation-delay:${Math.random()*.5}s;animation-duration:${.8+Math.random()*.8}s;
      width:${6+Math.random()*8}px;height:${6+Math.random()*8}px`;
    el.appendChild(p);
  }
  setTimeout(()=>el.innerHTML='',2200);
}

// ══════════════════════════════════════════════
// 启动
// ══════════════════════════════════════════════
loadS();
renderMap();
</script>
</body>
